# Development profile
# Use Dockerfile-compatible environment variable names with local defaults.
###    JDBC : DBMS :// HOST : PORT / DB
spring.datasource.url=jdbc:mysql://${DATABASE_URL:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:daop-entreprenly}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:password}

# Developer-friendly JPA behavior
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true

# App port
server.port=${PORT:8092}

# Local WhatsApp bridge outbound endpoint (so payment-approved/rejected messages reach the client).
chatbot.whatsapp.bridge-send-url=${WHATSAPP_BRIDGE_SEND_URL:http://localhost:3001/send}
