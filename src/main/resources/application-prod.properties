# Production profile
# Connects to Cloud SQL through the Java socket factory (recommended for Cloud Run).
# Only the database name, instance connection name, user and password come from the environment.
spring.datasource.url=jdbc:mysql:///${DATABASE_NAME:daop-entreprenly}?cloudSqlInstance=${CLOUD_SQL_CONNECTION_NAME}&ipTypes=PUBLIC&socketFactory=com.google.cloud.sql.mysql.SocketFactory&cloudSqlRefreshStrategy=lazy
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# Production-lean JPA behavior
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# App port
server.port=${PORT:8092}

# JWT secret must be provided as an environment variable in production.
authorization.jwt.secret=${JWT_SECRET}
