# Spring Application Name
spring.application.name=Entreprenly Platform

# Default to development when no explicit profile is provided.
spring.profiles.default=dev

# Shared Spring DataSource Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Shared Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.naming.physical-strategy=online.entreprenly.platform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Application Information for Documentation
# Elements take their values from maven pom.xml build-related information
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT Configuration Properties
authorization.jwt.secret=WriteHereYourSecretStringForTokenSigningCredentials
authorization.jwt.expiration.days=7

# i18n message bundles
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Chatbot WhatsApp channel
# When disabled the outbound adapter is a no-op logging stub (no cost, no credentials).
chatbot.whatsapp.enabled=${WHATSAPP_ENABLED:false}
chatbot.whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:entreprenly-verify}
# Shared secret guarding the bridge relay endpoints (must match the Node bridge).
chatbot.whatsapp.bridge-token=${WHATSAPP_BRIDGE_TOKEN:entreprenly-bridge-secret}
# Bridge outbound endpoint used to push messages to clients (payment approved/rejected,
# manual seller replies). When blank the outbound adapter degrades to a no-op stub.
chatbot.whatsapp.bridge-send-url=${WHATSAPP_BRIDGE_SEND_URL:}
# Base URL of the WhatsApp bridge (e.g. http://whatsapp-bridge:3001).
# Used to trigger QR session init for a new seller. When blank, QR init is skipped.
chatbot.whatsapp.bridge-base-url=${WHATSAPP_BRIDGE_BASE_URL:}

# Temporary admin endpoint secret.
# Set ADMIN_CLEANUP_TOKEN in the deployment env to enable the purge endpoint.
# When blank, the endpoint always returns 403 (safe default).
admin.cleanup-token=${ADMIN_CLEANUP_TOKEN:}
